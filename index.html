function directImg(url){ url=String(url||'').trim(); if(!url) return ''; var m=url.match(/drive\.google\.com\/file\/d\/([-\w]{10,})/); if(m) return 'https://drive.google.com/uc?export=view&id='+m[1]; m=url.match(/[?&]id=([-\w]{10,})/); if(m && /drive\.google\.com/.test(url)) return 'https://drive.google.com/uc?export=view&id='+m[1]; m=url.match(/\/open\?id=([-\w]{10,})/); if(m) return 'https://drive.google.com/uc?export=view&id='+m[1]; return url; }

U.today = function(){ return U.iso(new Date()); };

U.normalizeLink = function(url,name){ url=String(url||'').trim(); if(!url) return null; if(!/^https?:\/\//i.test(url)) url='https://'+url; return { url:url, name:(name&&name.trim())||U.linkLabel(url) }; };

/* ==================================================================
 *  Store — LOCAL engine (localStorage). ເປີດໄຟລ໌ແລ້ວໃຊ້ໄດ້ທັນທີ.
 *  ຂໍ້ມູນເກັບຢູ່ browser ຂອງເຄື່ອງນີ້. ຫຼາຍແທັບໃນເຄື່ອງດຽວກັນ sync ກັນ.
 * ================================================================== */
var _listeners=[];
var KEYS={ users:'wp_users', tasks:'wp_tasks', just:'wp_just', reports:'wp_reports', notif:'wp_notif', config:'wp_config', session:'wp_session', chat:'wp_chat', ref:'wp_ref', groups:'wp_groups' };
function _rnd(){ return Math.floor(Math.random()*99999); }

var Store = {
  authUser:null, me:null, _router:null,
  state:{ users:[], tasks:[], justifications:[], reports:[], notifications:[], chat:[], referrals:[], groups:[], config:null },
  _all:{ users:[], tasks:[], justifications:[], reports:[], notifications:[], chat:[], referrals:[], groups:[] },

  onChange:function(cb){ _listeners.push(cb); },

  _read:function(k,def){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } },
  _write:function(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); return true; }catch(e){ U.toast('ພື້ນທີ່ເກັບຂໍ້ມູນເຕັມ ບັນທຶກບໍ່ໄດ້','error'); return false; } },
  _loadAll:function(){ this._all.users=this._read(KEYS.users,[]); this._all.tasks=this._read(KEYS.tasks,[]); this._all.justifications=this._read(KEYS.just,[]); this._all.reports=this._read(KEYS.reports,[]); this._all.notifications=this._read(KEYS.notif,[]); this._all.chat=this._read(KEYS.chat,[]); this._all.referrals=this._read(KEYS.ref,[]); this._all.groups=this._read(KEYS.groups,[]); this.state.config=this._read(KEYS.config,null); },

  init:function(){

  },
  watchAuth:function(cb){ this._router=cb; cb(); },

  isAdmin:function(){ return this.me && this.me.role==='admin'; },
  isDirector:function(){ return this.me && this.me.role==='director'; },
  isBoard:function(){ return this.me && this.me.role==='board'; },
  isHead:function(){ return this.me && this.me.role==='head'; },
  isExec:function(){ return this.isDirector()||this.isBoard(); },                 // ຄະນະ/ຜູ້ບໍລິຫານ ຄຸມ
  seesAll:function(){ return this.isAdmin()||this.isDirector()||this.isBoard(); },  // ເຫັນທຸກພະແນກ
  canConfig:function(){ return this.isAdmin()||this.isDirector(); },               // admin-level (director=ບໍ່ເຫັນ DB)
  isManager:function(){ return this.seesAll()||this.isHead(); },                   // ມອບໝາຍ/ອະນຸມັດໄດ້
  myRank:function(){ return (this.me&&ROLES[this.me.role]&&ROLES[this.me.role].rank)||0; },
  myUid:function(){ return this.authUser?this.authUser.uid:null; },
  departments:function(){ return (this.state.config&&this.state.config.departments)?this.state.config.departments:ORG_SETTINGS.defaultDepartments.slice(); },

  // rebuild role-scoped views from the master lists (mirrors online scoping)
  _recompute:function(){
    var me=this.me, uid=me?me.id:null;
    this.state.users=this._all.users.map(function(u){ var c=Object.assign({},u); delete c.password; return c; }).sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
    var all=this.seesAll();
    var scope=function(arr,f){ if(!me) return []; if(all) return arr.slice(); if(me.role==='head') return arr.filter(function(x){return x.dept===me.dept;}); return arr.filter(function(x){return x[f]===uid;}); };
    this.state.tasks=(!me?[]:all?this._all.tasks.slice():me.role==='head'?this._all.tasks.filter(function(t){return t.department===me.dept;}):this._all.tasks.filter(function(t){return t.assigneeUid===uid;})).sort(function(a,b){ return (a.startDate||'').localeCompare(b.startDate||''); });
    this.state.justifications=scope(this._all.justifications,'staffUid').sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });
    this.state.reports=scope(this._all.reports,'staffUid').sort(function(a,b){ return (b.month||'').localeCompare(a.month||''); });
    this.state.notifications=(uid?this._all.notifications.filter(function(n){return n.toUid===uid;}):[]).sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });
    this.state.chat=(uid?this._all.chat.filter(function(c){return c.from===uid||c.to===uid;}):[]).sort(function(a,b){ return (a.createdAt||'').localeCompare(b.createdAt||''); });
    this.state.referrals=(uid?this._all.referrals.filter(function(r){return r.fromUid===uid||r.toUid===uid;}):[]).sort(function(a,b){ return (b.createdAt||'').localeCompare(a.createdAt||''); });
    this.state.groups=(uid?this._all.groups.filter(function(g){return (g.members||[]).indexOf(uid)>=0;}):[]).sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  },
  // ---- chat (1:1) ----
  chatSend:function(toUid,msg){ if(!this.me) return Promise.resolve(); var gid=msg.group||''; if(!toUid && !gid) return Promise.resolve(); var self=this; var rec={ id:'C'+Date.now()+_rnd(), from:this.me.id, fromName:this.me.name, to:gid?'':toUid, group:gid, type:msg.type||'text', text:msg.text||'', dataUrl:msg.dataUrl||'', fileName:msg.fileName||'', mime:msg.mime||'', dur:msg.dur||0, read:false, createdAt:new Date().toISOString() }; this._all.chat.push(rec); this._saveColl('chat',KEYS.chat); var pv=(rec.type==='text'?rec.text:(rec.type==='voice'?'🎤 ຂໍ້ຄວາມສຽງ':rec.type==='image'?'🖼 ຮູບ':'📎 ໄຟລ໌')); if(gid){ var g=this.groupGet(gid); if(g)(g.members||[]).forEach(function(m){ if(m!==self.me.id) self.notify(m,'👥 '+(g.name||'ກຸ່ມ')+' — '+self.me.name, pv, 'grp:'+gid, 'chat'); }); } else { this.notify(toUid,'💬 ຂໍ້ຄວາມໃໝ່ ຈາກ '+this.me.name, pv, this.me.id, 'chat'); } return Promise.resolve(rec.id); },
  chatThread:function(otherUid){ var uid=this.myUid(); return this._all.chat.filter(function(c){ return (c.from===uid&&c.to===otherUid)||(c.from===otherUid&&c.to===uid); }).sort(function(a,b){ return (a.createdAt||'').localeCompare(b.createdAt||''); }); },
  chatMarkRead:function(otherUid){ var uid=this.myUid(); var ch=false; this._all.chat.forEach(function(c){ if(c.to===uid&&c.from===otherUid&&!c.read){ c.read=true; ch=true; } }); if(ch) this._saveColl('chat',KEYS.chat); },
  chatUnreadFrom:function(otherUid){ var uid=this.myUid(); return this._all.chat.filter(function(c){ return c.to===uid&&c.from===otherUid&&!c.read; }).length; },
  chatUnreadTotal:function(){ var uid=this.myUid(); return this._all.chat.filter(function(c){ return c.to===uid&&!c.read; }).length; },
  chatLastWith:function(otherUid){ var t=this.chatThread(otherUid); return t.length?t[t.length-1]:null; },
  _saveColl:function(coll,key){ this._write(key,this._all[coll]); this._recompute(); this._emit(); if(window.Cloud&&Cloud.on) Cloud.push(coll); },

  login:function(empNo,password){ var self=this; return new Promise(function(res,rej){ var u=self._all.users.find(function(x){return (x.empNo||'').toLowerCase()===String(empNo).trim().toLowerCase();}); if(!u){ var e=new Error('nf'); e.code='auth/user-not-found'; return rej(e); } if(u.active===false){ var e2=new Error('dis'); e2.code='auth/user-disabled'; return rej(e2); } if(String(u.password||'')!==String(password)){ var e3=new Error('wp'); e3.code='auth/wrong-password'; return rej(e3); } self._write(KEYS.session,u.id); self.authUser={uid:u.id}; self.me=u; self._recompute(); if(self._router) self._router(); self._emit(); res(); }); },
  logout:function(){ try{ localStorage.removeItem(KEYS.session); }catch(e){} this.authUser=null; this.me=null; this._recompute(); if(this._router) this._router(); this._emit(); return Promise.resolve(); },
  changeMyPassword:function(currentPwd,newPwd){ var self=this; return new Promise(function(res,rej){ if(String(newPwd).length<6){ var e=new Error('short'); e.code='auth/weak-password'; return rej(e); } var u=self._all.users.find(function(x){return x.id===self.me.id;}); if(!u||String(u.password||'')!==String(currentPwd)){ var e2=new Error('wp'); e2.code='auth/wrong-password'; return rej(e2); } u.password=String(newPwd); self._write(KEYS.users,self._all.users); self.me=u; res(); }); },

  needsFirstAdmin:function(){ return this._all.users.length===0; },
  createFirstAdmin:function(o){ var self=this; return new Promise(function(res,rej){ try{ var uid='U'+Date.now(); var admin={ id:uid, empNo:String(o.empNo).trim(), name:o.name, dept:'ບໍລິຫານ', role:'admin', headId:null, active:true, password:String(o.password), createdAt:new Date().toISOString() }; self._all.users=[admin]; self._write(KEYS.users,self._all.users); if(!self.state.config){ self.state.config={ departments:ORG_SETTINGS.defaultDepartments.slice(), orgName:ORG_SETTINGS.orgName }; self._write(KEYS.config,self.state.config); } self._write(KEYS.session,uid); self.authUser={uid:uid}; self.me=admin; self._recompute(); res(); }catch(e){ rej(e); } }); },

  createUser:function(o){ var self=this; return new Promise(function(res,rej){ if(!o.empNo||!o.password){ return rej(new Error('ຕ້ອງມີເລກພະນັກງານ ແລະ ລະຫັດຜ່ານ')); } if(String(o.password).length<6){ var e=new Error('short'); e.code='auth/weak-password'; return rej(e); } if(self._all.users.some(function(x){return (x.empNo||'').toLowerCase()===String(o.empNo).trim().toLowerCase();})){ var e2=new Error('dup'); e2.code='auth/email-already-in-use'; return rej(e2); } var uid='U'+Date.now()+_rnd(); self._all.users.push({ id:uid, empNo:String(o.empNo).trim(), name:o.name||'', dept:o.dept||self.departments()[0], role:o.role||'staff', headId:o.headId||null, active:true, password:String(o.password), createdAt:new Date().toISOString() }); self._saveColl('users',KEYS.users); res(uid); }); },
  updateUser:function(uid,patch){ var u=this._all.users.find(function(x){return x.id===uid;}); if(u){ Object.assign(u,patch); if(this.me&&this.me.id===uid) this.me=u; this._saveColl('users',KEYS.users); } return Promise.resolve(); },
  setUserActive:function(uid,active){ return this.updateUser(uid,{active:!!active}); },
  saveConfig:function(patch){ this.state.config=Object.assign(this.state.config||{},patch); this._write(KEYS.config,this.state.config); this._emit(); if(window.Cloud&&Cloud.on) Cloud.pushConfig(); return Promise.resolve(); },

  saveTask:function(rec){ rec.updatedAt=new Date().toISOString(); rec.updatedBy=this.myUid(); if(!rec.id) rec.id='TK'+Date.now()+_rnd(); if(!rec.createdAt) rec.createdAt=new Date().toISOString(); var i=this._all.tasks.findIndex(function(x){return x.id===rec.id;}); if(i>=0) this._all.tasks[i]=Object.assign(this._all.tasks[i],rec); else this._all.tasks.push(rec); this._saveColl('tasks',KEYS.tasks); return Promise.resolve(rec.id); },
  updateTask:function(id,patch){ var t=this._all.tasks.find(function(x){return x.id===id;}); if(t){ Object.assign(t,patch); t.updatedAt=new Date().toISOString(); t.updatedBy=this.myUid(); this._saveColl('tasks',KEYS.tasks); } return Promise.resolve(); },
  deleteTask:function(id){ this._all.tasks=this._all.tasks.filter(function(x){return x.id!==id;}); this._saveColl('tasks',KEYS.tasks); return Promise.resolve(); },
  getTask:function(id){ return this._all.tasks.find(function(t){return t.id===id;})||null; },

  createJustification:function(rec){ rec.id='JF'+Date.now()+_rnd(); rec.status='pending'; rec.createdAt=new Date().toISOString(); this._all.justifications.push(rec); this._saveColl('justifications',KEYS.just); return Promise.resolve(rec.id); },
  decideJustification:function(id,decision,comment){ var j=this._all.justifications.find(function(x){return x.id===id;}); if(j){ j.status=decision; j.headComment=comment||''; j.decidedAt=new Date().toISOString(); j.decidedByUid=this.myUid(); j.decidedByName=this.me?this.me.name:''; this._saveColl('justifications',KEYS.just); } return Promise.resolve(); },
  getJustification:function(id){ return this._all.justifications.find(function(j){return j.id===id;})||null; },

  submitReport:function(rec){ rec.id=rec.staffUid+'_'+rec.month; rec.submittedAt=new Date().toISOString(); rec.status='submitted'; var i=this._all.reports.findIndex(function(x){return x.id===rec.id;}); if(i>=0) this._all.reports[i]=rec; else this._all.reports.push(rec); this._saveColl('reports',KEYS.reports); return Promise.resolve(); },
  getReport:function(staffUid,month){ return this._all.reports.find(function(r){return r.id===staffUid+'_'+month;})||null; },

  notify:function(toUid,title,body,refId,type){ if(!toUid) return Promise.resolve(); this._all.notifications.push({ id:'N'+Date.now()+_rnd(), toUid:toUid, title:title||'', body:body||'', refId:refId||'', type:type||'info', read:false, createdAt:new Date().toISOString() }); if(this._all.notifications.length>300) this._all.notifications=this._all.notifications.slice(-300); this._saveColl('notifications',KEYS.notif); return Promise.resolve(); },
  markAllNotifsRead:function(){ var uid=this.myUid(), ch=false; this._all.notifications.forEach(function(n){ if(n.toUid===uid&&!n.read){ n.read=true; ch=true; } }); if(ch) this._saveColl('notifications',KEYS.notif); },
  markNotificationRead:function(id){ var n=this._all.notifications.find(function(x){return x.id===id;}); if(n){ n.read=true; this._saveColl('notifications',KEYS.notif); } return Promise.resolve(); },
  readNotifsBy:function(type,refId){ var uid=this.myUid(), ch=false; this._all.notifications.forEach(function(n){ if(n.toUid===uid&&n.type===type&&n.refId===refId&&!n.read){ n.read=true; ch=true; } }); if(ch) this._saveColl('notifications',KEYS.notif); },

  clearAllData:function(){ [KEYS.users,KEYS.tasks,KEYS.just,KEYS.reports,KEYS.notif,KEYS.config,KEYS.session,KEYS.chat,KEYS.ref,KEYS.groups].forEach(function(k){ try{ localStorage.removeItem(k); }catch(e){} }); },
  groupCreate:function(name,members){ var me=this.myUid(); var mem=[me].concat((members||[]).filter(function(x){return x!==me;})); var rec={ id:'G'+Date.now()+_rnd(), name:name||'ກຸ່ມ', members:mem, createdBy:me, createdAt:new Date().toISOString() }; this._all.groups.push(rec); this._saveColl('groups',KEYS.groups); return Promise.resolve(rec.id); },
  groupUpdate:function(gid,patch){ var g=this._all.groups.find(function(x){return x.id===gid;}); if(g){ Object.assign(g,patch); this._saveColl('groups',KEYS.groups); } return Promise.resolve(); },
  groupGet:function(gid){ return this._all.groups.find(function(g){return g.id===gid;})||null; },
  groupThread:function(gid){ return this._all.chat.filter(function(c){return c.group===gid;}).sort(function(a,b){return (a.createdAt||'').localeCompare(b.createdAt||'');}); },
  _greadKey:function(gid){ return 'wp_gread_'+(this.myUid()||'')+'_'+gid; },
  groupMarkRead:function(gid){ try{ localStorage.setItem(this._greadKey(gid), new Date().toISOString()); }catch(e){} },
  groupUnread:function(gid){ var last=''; try{ last=localStorage.getItem(this._greadKey(gid))||''; }catch(e){} var uid=this.myUid(); return this._all.chat.filter(function(c){ return c.group===gid && c.from!==uid && (c.createdAt||'')>last; }).length; },
  groupUnreadTotal:function(){ var self=this; return (this.state.groups||[]).reduce(function(s,g){ return s+self.groupUnread(g.id); },0); },
  groupLast:function(gid){ var t=this.groupThread(gid); return t.length?t[t.length-1]:null; },
  // ---- referrals (ໃບກິດສຳພັນ ຂ້າມພະແນກ) ----
  refSend:function(rec){ rec.id='R'+Date.now()+_rnd(); rec.status='sent'; rec.createdAt=new Date().toISOString(); rec.history=[{s:'sent',at:rec.createdAt,by:this.me.id}]; this._all.referrals.push(rec); this._saveColl('referrals',KEYS.ref); return Promise.resolve(rec.id); },
  refUpdate:function(id,patch,stage){ var r=this._all.referrals.find(function(x){return x.id===id;}); if(r){ Object.assign(r,patch); if(stage){ r.history=r.history||[]; r.history.push({s:stage,at:new Date().toISOString(),by:this.myUid()}); } this._saveColl('referrals',KEYS.ref); } return Promise.resolve(); },
  refGet:function(id){ return this._all.referrals.find(function(x){return x.id===id;})||null; },
  refIncomingNew:function(){ var uid=this.myUid(); return this._all.referrals.filter(function(r){ return r.toUid===uid && r.status==='sent'; }); },
  refDeclinedNew:function(){ var uid=this.myUid(); return this._all.referrals.filter(function(r){ return r.fromUid===uid && r.status==='declined' && !r.senderSeen; }); },
  refBadge:function(){ return this.refIncomingNew().length + this.refDeclinedNew().length; }
};

/* ==================================================================
 *  Cloud — ຊັ້ນ Firebase (ອອນລາຍ, ທຸກເຄື່ອງໃຊ້ຂໍ້ມູນດຽວກັນ real-time)
 *  ເປີດໃຊ້ໂດຍແອັດມິນໃສ່ config. ຖ້າບໍ່ໄດ້ເຊື່ອມ → ໃຊ້ localStorage ຄືເກົ່າ.
 * ================================================================== */
var CKEY={ users:KEYS.users, tasks:KEYS.tasks, justifications:KEYS.just, reports:KEYS.reports, notifications:KEYS.notif, chat:KEYS.chat, referrals:KEYS.ref, groups:KEYS.groups };
var CLOUD_RULES=[
"rules_version = '2';",
"service cloud.firestore {",
"  match /databases/{database}/documents {",
"    match /{document=**} { allow read, write: if true; }",
"  }",
"}"
].join('\n');
var Cloud={
  on:false, ready:false, db:null, cfg:null, unsub:[], shadow:{},
  COLLS:['users','tasks','justifications','reports','notifications','chat','referrals','groups'],
  saved:function(){ try{ return JSON.parse(localStorage.getItem('wp_fb')||'null'); }catch(e){ return null; } },

App.calendarHTML = function(){

App.reportData = function(){

  var start=new Date(yr,mo-2,26), end=new Date(yr,mo-1,ORG_SETTINGS.reportCycleEndDay);

    chart.push({ name:String(cur.getDate()), done:dayTasks.filter(function(t){return t.status==='COMPLETED';}).length, wait:dayTasks.filter(function(t){return t.status==='WAITING_APPROVAL';}).length, undone:dayTasks.filter(function(t){return t.status!=='COMPLETED'&&t.status!=='WAITING_APPROVAL';}).length });

App.changeStatus = function(id,status){ var t=Store.getTask(id); if(!t||!status) return;
  // ພະນັກງານ ແກ້ໄຂ/ຍ້າຍໄດ້ສະເພາະວຽກຂອງໂຕເອງ
  if(!Store.isManager() && t.assigneeUid!==Store.myUid()){ U.toast('ນີ້ບໍ່ແມ່ນວຽກຂອງທ່ານ','warn'); return; }
  // ວຽກມື້ໜ້າຖືກລ໋ອກ ຖ້າຍັງມີວຽກຄ້າງເກົ່າ
  if(!Store.isManager() && App.isLockedTask(t)){ U.toast('ຕ້ອງເຮັດວຽກຄ້າງເກົ່າໃຫ້ແລ້ວກ່ອນ ຈຶ່ງເຮັດວຽກມື້ຖັດໄປໄດ້','warn'); return; }
  // ເລີ່ມເຮັດວຽກລ່ວງໜ້າ (ວັນທີໃນອະນາຄົດ) → ດຶງວັນທີມາເປັນມື້ນີ້
  if(!Store.isManager() && t.assigneeUid===Store.myUid() && (t.startDate||'').slice(0,10)>U.today() && (status==='IN_PROGRESS'||status==='COMPLETED'||status==='WAITING_APPROVAL')){
    Store.updateTask(id,{startDate:U.today(),dueDate:U.today(),pulledEarly:true});
  }
  // ພະນັກງານ: ວຽກທີ່ຫົວໜ້າມອບໝາຍ ຫ້າມຕັດສິນ "ສຳເລັດ" ເອງ — ຕ້ອງສົ່ງໃຫ້ຫົວໜ້າອະນຸມັດ
  if(!Store.isManager() && App.needsApproval(t)){
    if(status==='COMPLETED'||status==='WAITING_APPROVAL'){ App.submitWork(id); return; }
    if(status==='PENDING'||status==='IN_PROGRESS'){ Store.updateTask(id,{status:status,completedDate:''}).catch(function(e){ U.toast('ອັບເດດບໍ່ໄດ້: '+e.message,'error'); }); return; }
    U.toast('ວຽກນີ້ຕ້ອງໃຫ້ຫົວໜ້າອະນຸມັດ','warn'); return;
  }
  if(status==='COMPLETED'||status==='WAITING_APPROVAL'||(status==='IN_PROGRESS'&&t.status!=='PENDING')){ App.statusNoteDialog(id,status); return; }
  Store.updateTask(id,{status:status,completedDate:''}).catch(function(e){ U.toast('ອັບເດດບໍ່ໄດ້: '+e.message,'error'); }); };
App.statusNoteDialog = function(id,targetStatus){ var titles={WAITING_APPROVAL:'ຄຳອະທິບາຍສຳລັບຫົວໜ້າ (ຂໍອະນຸມັດ)',COMPLETED:'ໝາຍເຫດ (ສຳເລັດ)',IN_PROGRESS:'ເຫດຜົນ / ຄວາມຄືບໜ້າ'}; U.showModal('<div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl p-5"><h3 class="font-bold text-slate-800 mb-3">'+(titles[targetStatus]||'ໝາຍເຫດ')+'</h3><textarea id="stNote" rows="3" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm mb-3" placeholder="ພິມລາຍລະອຽດ (ຖ້າມີ)..."></textarea><div class="flex justify-end gap-2"><button onclick="UI_close()" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-slate-600 text-sm">ຍົກເລີກ</button><button onclick="App.submitStatusNote(\''+id+'\',\''+targetStatus+'\')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700">ບັນທຶກ</button></div></div>'); };
App.submitStatusNote = function(id,targetStatus){ var t=Store.getTask(id); if(!t){ U.closeModal(); return; } var note=U.val('stNote'); var patch={status:targetStatus}; if(note) patch.failureReason=note; patch.completedDate=targetStatus==='COMPLETED'?U.today():''; Store.updateTask(id,patch).then(function(){ if(targetStatus==='WAITING_APPROVAL') App.pingHeadOf(t,'ວຽກລໍຖ້າອະນຸມັດ',t.title); U.closeModal(); U.toast('ບັນທຶກສະຖານະແລ້ວ','success'); }).catch(function(e){ U.toast('ຜິດພາດ: '+e.message,'error'); }); };

App.requestDelay = function(taskId){ var t=Store.getTask(taskId); if(!t) return; var tm=new Date(); tm.setDate(tm.getDate()+1); U.showModal('<div class="bg-white rounded-2xl w-full max-w-md shadow-2xl p-5 max-h-[90vh] overflow-y-auto"><h3 class="font-bold text-slate-800 mb-1"><i class="fa-solid fa-file-signature text-amber-600 mr-1"></i>ຟອມຊີ້ແຈງ ຂໍເລື່ອນວຽກ</h3><p class="text-[11px] text-slate-500 mb-3">ວຽກ: <b>'+U.esc(t.title)+'</b> — ຫົວໜ້າຕ້ອງອະນຸມັດກ່ອນ ຈຶ່ງຈະຍ້າຍໄປວັນໃໝ່.</p><label class="text-[11px] font-bold text-slate-600">ເຫດຜົນ *</label><textarea id="jfReason" rows="3" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm mb-2 mt-1" placeholder="ອະທິບາຍວ່າເປັນຫຍັງເຮັດບໍ່ທັນ / ຕ້ອງເລື່ອນ..."></textarea><label class="text-[11px] font-bold text-slate-600">ຂໍຍ້າຍໄປວັນທີ *</label><input type="date" id="jfDate" value="'+U.iso(tm)+'" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm mb-2 mt-1"><label class="text-[11px] font-bold text-slate-600">ລິ້ງເອກະສານຫຼັກຖານ (Google Drive, ໜຶ່ງລິ້ງຕໍ່ແຖວ)</label><textarea id="jfLinks" rows="2" placeholder="https://drive.google.com/..." class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs mb-4 mt-1"></textarea><div class="flex justify-end gap-2"><button onclick="UI_close()" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-slate-600 text-sm">ຍົກເລີກ</button><button onclick="App.submitJustification(\''+taskId+'\')" class="px-4 py-2 bg-amber-600 text-white rounded-lg text-sm font-bold hover:bg-amber-700"><i class="fa-solid fa-paper-plane mr-1"></i>ສົ່ງໃຫ້ຫົວໜ້າ</button></div></div>'); };
App.submitJustification = function(taskId){ var t=Store.getTask(taskId); if(!t) return; var reason=U.val('jfReason').trim(); var newDate=U.val('jfDate'); if(!reason||!newDate){ U.toast('ກະລຸນາໃສ່ເຫດຜົນ ແລະ ວັນທີ','error'); return; } var links=U.val('jfLinks').split('\n').map(function(l){return U.normalizeLink(l);}).filter(Boolean); Store.createJustification({ taskId:taskId, taskTitle:t.title, staffUid:t.assigneeUid||Store.myUid(), staffName:t.assigneeName||Store.me.name, dept:t.department, reason:reason, requestedNewDate:newDate, driveLinks:links }).then(function(){ return Store.updateTask(taskId,{status:'WAITING_APPROVAL',failureReason:reason}).then(function(){ App.pingHeadOf(t,'ຄຳຮ້ອງຂໍເລື່ອນວຽກ',t.title+' — '+Store.me.name); U.closeModal(); U.toast('ສົ່ງຟອມຊີ້ແຈງໃຫ້ຫົວໜ້າແລ້ວ','success'); }); }).catch(function(e){ U.toast('ສົ່ງບໍ່ໄດ້: '+e.message,'error'); }); };
App.pingHeadOf = function(task,title,body){ var heads=Store.state.users.filter(function(u){ return u.role==='head'&&u.dept===task.department&&u.active!==false; }); heads.forEach(function(h){ Store.notify(h.id,title,body,task.id,'justification'); }); };

  return '<div class="space-y-3"><h3 class="font-bold text-slate-800"><i class="fa-solid fa-inbox text-indigo-600 mr-2"></i>ຄຳຮ້ອງຊີ້ແຈງ (ອະນຸມັດ)</h3>'+(rows||'<div class="bg-white rounded-xl p-8 text-center text-slate-400 text-sm border border-slate-100">ຍັງບໍ່ມີຄຳຮ້ອງ</div>')+'</div>';
};
App.myRequests = function(){ var list=Store.state.justifications; var rows=list.map(function(j){ var badge=j.status==='pending'?'<span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">ລໍຖ້າຫົວໜ້າ</span>':j.status==='approved'?'<span class="text-[10px] bg-teal-100 text-teal-700 px-2 py-0.5 rounded-full font-bold">ອະນຸມັດແລ້ວ</span>':'<span class="text-[10px] bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full font-bold">ຖືກປະຕິເສດ</span>'; return '<div class="bg-white border border-slate-100 rounded-xl p-4 shadow-sm"><div class="flex justify-between items-start"><p class="font-bold text-slate-800 text-sm">'+U.esc(j.taskTitle)+'</p>'+badge+'</div><p class="text-[11px] text-slate-500 mt-0.5">ຂໍຍ້າຍໄປ '+U.lao(j.requestedNewDate)+'</p><div class="mt-2 p-2 bg-slate-50 rounded-lg text-xs text-slate-700">'+U.esc(j.reason)+'</div>'+U.linksHTML(j.driveLinks)+(j.headComment?'<div class="mt-2 p-2 bg-indigo-50 rounded-lg text-xs text-indigo-800"><b>ຄຳຕອບຫົວໜ້າ:</b> '+U.esc(j.headComment)+'</div>':'')+'</div>'; }).join(''); return '<div class="space-y-3"><h3 class="font-bold text-slate-800"><i class="fa-solid fa-file-signature text-indigo-600 mr-2"></i>ຄຳຮ້ອງຊີ້ແຈງຂອງຂ້ອຍ</h3>'+(rows||'<div class="bg-white rounded-xl p-8 text-center text-slate-400 text-sm border border-slate-100">ຍັງບໍ່ມີຄຳຮ້ອງ</div>')+'</div>'; };
App.decide = function(jid,decision){ var j=Store.getJustification(jid); if(!j) return; var label=decision==='approved'?'ອະນຸມັດ ແລະ ຍ້າຍວຽກໄປວັນທີ '+U.lao(j.requestedNewDate):'ປະຕິເສດຄຳຮ້ອງ'; U.showModal('<div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl p-5"><h3 class="font-bold text-slate-800 mb-1">'+label+'</h3><p class="text-[11px] text-slate-500 mb-3">ວຽກ: '+U.esc(j.taskTitle)+'</p><textarea id="deComment" rows="2" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm mb-3" placeholder="ຄຳເຫັນ (ຖ້າມີ)..."></textarea><div class="flex justify-end gap-2"><button onclick="UI_close()" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-slate-600 text-sm">ຍົກເລີກ</button><button onclick="App.confirmDecision(\''+jid+'\',\''+decision+'\')" class="px-4 py-2 '+(decision==='approved'?'bg-teal-600':'bg-rose-600')+' text-white rounded-lg text-sm font-bold">ຢືນຢັນ</button></div></div>'); };

App.saveUser = function(id){
  var name=U.val('uf_name').trim(); var dept=U.val('uf_dept'); var role=U.val('uf_role');

  var emp=U.val('uf_emp').trim(); var pwd=U.val('uf_pwd'); if(!emp||pwd.length<6){ U.toast('ໃສ່ເລກພະນັກງານ ແລະ ລະຫັດ ≥ 6 ໂຕ','error'); return; }
  if(Store.state.users.some(function(x){return (x.empNo||'').toLowerCase()===emp.toLowerCase();})){ U.toast('ເລກພະນັກງານນີ້ຖືກໃຊ້ແລ້ວ','error'); return; }
  var headId=Store.isHead()?Store.myUid():null;
  Store.createUser({empNo:emp,name:name,dept:dept,role:role,password:pwd,headId:headId}).then(function(){ U.closeModal(); U.toast('ສ້າງພະນັກງານແລ້ວ','success'); }).catch(function(e){ U.toast('ສ້າງບໍ່ໄດ້: '+friendlyAuth(e),'error'); });
};

// ວຽກເກີນກຳນົດ (ຫຼັງພົ້ນວັນກຳນົດ ຍັງບໍ່ສຳເລັດ/ຍັງບໍ່ສົ່ງ) ຂອງໂຕເອງ
App.overdueTasks = function(){ var today=U.today(), uid=Store.myUid(); return Store._all.tasks.filter(function(t){ if(t.assigneeUid!==uid) return false; if(t.status!=='PENDING'&&t.status!=='IN_PROGRESS') return false; var d=(t.dueDate||t.startDate||'').slice(0,10); return d && d<today; }); };
// ວຽກຂອງໂຕເອງ ທີ່ຢູ່ໃນຊ່ວງເຮັດ ໃນມື້ທີ່ເລືອກ (ຄ່າເລີ່ມຕົ້ນ=ມື້ນີ້) + ວຽກເກີນກຳນົດ
App.boardTasks = function(){ var uid=Store.myUid(); var day=App.boardDate||U.today(); var today=U.today(); return Store.state.tasks.filter(function(t){ if(t.assigneeUid!==uid) return false; var s=(t.startDate||'').slice(0,10), d=(t.dueDate||t.startDate||'').slice(0,10); if(s&&d&&s<=day&&day<=d) return true; if(s&&!t.dueDate&&s===day) return true; if((t.status==='PENDING'||t.status==='IN_PROGRESS')&&d&&d<today) return true; if(t.status==='WAITING_APPROVAL'&&s<=day) return true; if(t.status==='COMPLETED'&&(t.completedDate||'').slice(0,10)===day) return true; return false; }); };

/* ---- ຫຼັກຖານ (ຮູບ/ໄຟລ໌/ສຽງ) ---- */
App._ev = [];
App._fileToData = function(file, cb){
  var isImg=/^image\//.test(file.type||''); var reader=new FileReader();
  reader.onload=function(){
    if(isImg){ var img=new Image(); img.onload=function(){ var max=1000, w=img.width, h=img.height; if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } } var c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); cb({type:'image',dataUrl:c.toDataURL('image/jpeg',0.6),name:file.name||'image',mime:'image/jpeg'}); }; img.onerror=function(){ cb(null); }; img.src=reader.result; }
    else { if(file.size>1600000){ U.toast('ໄຟລ໌ໃຫຍ່ເກີນ ~1.5MB — ໃຫ້ໃຊ້ລິ້ງ Google Drive ແທນ','warn'); cb(null); return; } cb({type:'file',dataUrl:reader.result,name:file.name||'file',mime:file.type||'application/octet-stream'}); }
  };
  reader.readAsDataURL(file);
};
App._evPickFile = function(){ var inp=document.createElement('input'); inp.type='file'; inp.accept='image/*,application/pdf,*/*'; inp.multiple=true; inp.onchange=function(){ [].slice.call(inp.files||[]).forEach(function(f){ App._fileToData(f,function(res){ if(res){ App._ev.push(res); App._evRefresh(); } }); }); }; inp.click(); };
App._evRefresh = function(){ var box=document.getElementById('evBox'); if(!box) return; box.innerHTML=App._ev.map(function(e,i){ var thumb=e.type==='image'?'<img src="'+e.dataUrl+'" class="w-12 h-12 rounded object-cover">':e.type==='voice'?'<span style="font-size:20px">🎤</span>':'<span style="font-size:20px">📎</span>'; return '<div class="relative inline-flex items-center justify-center border border-slate-200 rounded-lg p-1 mr-1 mb-1" style="width:56px;height:56px"><button onclick="App._ev.splice('+i+',1);App._evRefresh()" class="absolute -top-1 -right-1 bg-rose-500 text-white rounded-full w-4 h-4 text-[9px]">×</button>'+thumb+'</div>'; }).join('')||'<span class="text-[11px] text-slate-400">ຍັງບໍ່ມີຫຼັກຖານ</span>'; };
App.evView = function(ev){ if(!ev||!ev.length) return ''; return '<div class="flex flex-wrap gap-2 mt-2 items-center">'+ev.map(function(e){ if(e.type==='image') return '<img src="'+e.dataUrl+'" onclick="event.stopPropagation();App.viewImage(this.src)" class="w-16 h-16 rounded-lg object-cover cursor-pointer border border-slate-200">'; if(e.type==='voice') return '<audio controls src="'+e.dataUrl+'"></audio>'; if(e.type==='link') return '<a href="'+U.esc(e.url)+'" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-[11px] bg-sky-600 text-white px-3 py-1.5 rounded-lg hover:bg-sky-700 font-bold"><i class="fa-brands fa-google-drive"></i>ເປີດ '+U.esc(e.name||'Google Drive')+' <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i></a>'; return '<a href="'+e.dataUrl+'" download="'+U.esc(e.name)+'" class="inline-flex items-center gap-1 text-[11px] bg-slate-700 text-white px-3 py-1.5 rounded-lg hover:bg-slate-800 font-bold"><i class="fa-solid fa-download"></i>'+U.esc(e.name||'ໄຟລ໌')+'</a>'; }).join('')+'</div>'; };

/* ---- voice recording (chat + evidence) ---- */
App._toggleRec = function(onDone){
  if(App._rec && App._rec.state==='recording'){ App._recDone=onDone; App._rec.stop(); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder==='undefined'){ U.toast('ອຸປະກອນ/ໂປຣແກຣມນີ້ບັນທຶກສຽງບໍ່ໄດ້ (ລອງເປີດຜ່ານ localhost/https)','error'); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    var mr; try{ mr=new MediaRecorder(stream); }catch(e){ U.toast('ບັນທຶກສຽງບໍ່ໄດ້','error'); stream.getTracks().forEach(function(t){t.stop();}); return; }
    App._rec=mr; var chunks=[], start=Date.now(); App._recDone=onDone;
    mr.ondataavailable=function(e){ if(e.data&&e.data.size) chunks.push(e.data); };
    mr.onstop=function(){ stream.getTracks().forEach(function(t){t.stop();}); var blob=new Blob(chunks,{type:mr.mimeType||'audio/webm'}); var r=new FileReader(); r.onload=function(){ var done=App._recDone; App._rec=null; App._recDone=null; App._updateRecBtn(false); if(done) done({dataUrl:r.result,mime:blob.type,dur:Math.round((Date.now()-start)/1000)}); }; r.readAsDataURL(blob); };
    mr.start(); App._updateRecBtn(true); U.toast('ກຳລັງອັດສຽງ... ກົດອີກຄັ້ງເພື່ອຢຸດ & ສົ່ງ','info');
  }).catch(function(){ U.toast('ບໍ່ໄດ້ຮັບອະນຸຍາດໄມໂຄຣໂຟນ','error'); });
};
App._updateRecBtn = function(on){ ['recBtn','evRecBtn'].forEach(function(id){ var b=document.getElementById(id); if(!b) return; if(id==='recBtn') b.innerHTML=on?'<i class="fa-solid fa-stop"></i>':'<i class="fa-solid fa-microphone"></i>'; else b.innerHTML=on?'<i class="fa-solid fa-stop mr-1"></i>ຢຸດ':'<i class="fa-solid fa-microphone mr-1"></i>ອັດສຽງ'; b.style.color=on?'#e11d48':''; }); };
App._evToggleRec = function(){ App._toggleRec(function(res){ if(res){ App._ev.push({type:'voice',dataUrl:res.dataUrl,mime:res.mime,dur:res.dur,name:'voice'}); App._evRefresh(); } }); };

/* ---- ພະນັກງານ ສົ່ງວຽກໃຫ້ຫົວໜ້າກວດ ---- */
App.approverCandidates = function(){ var me=Store.me; var us=Store.state.users.filter(function(u){ return u.active!==false && u.id!==me.id; }); var r=me.role; if(r==='staff'||r==='student') return us.filter(function(u){ return u.role==='head'&&u.dept===me.dept; }); if(r==='head') return us.filter(function(u){ return u.role==='board'||u.role==='director'; }); if(r==='board') return us.filter(function(u){ return u.role==='director'; }); if(r==='director') return us.filter(function(u){ return u.role==='admin'; }); return us.filter(function(u){ return (ROLES[u.role]||{}).rank>Store.myRank(); }); };
App.submitWork = function(taskId){ var t=Store.getTask(taskId); if(!t) return; App._ev=[]; var cands=App.approverCandidates();
  var appSel = cands.length? ('<label class="text-[11px] font-bold text-slate-600 block mt-1">ສົ່ງໃຫ້ໃຜກວດ/ອະນຸມັດ *</label><select id="swApprover" class="w-full rounded-lg p-2 bg-slate-50 border border-slate-200 mb-2 mt-1">'+cands.map(function(u){ return '<option value="'+u.id+'">'+U.esc(u.name)+' ('+U.esc((ROLES[u.role]||{}).lo||u.role)+(u.dept?' · '+U.esc(u.dept):'')+')</option>'; }).join('')+'</select>') : '';
  U.showModal('<div class="bg-white rounded-2xl w-full max-w-md shadow-2xl p-5 max-h-[90vh] overflow-y-auto"><h3 class="font-bold text-slate-800 mb-1"><i class="fa-solid fa-paper-plane text-teal-600 mr-1"></i>ສົ່ງວຽກໃຫ້ກວດ (ຂໍອະນຸມັດ)</h3><p class="text-[11px] text-slate-500 mb-2">ວຽກ: <b>'+U.esc(t.title)+'</b></p>'+appSel+'<label class="text-[11px] font-bold text-slate-600">ຄຳອະທິບາຍ *</label><textarea id="swNote" rows="3" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm mb-2 mt-1" placeholder="ອະທິບາຍວຽກທີ່ເຮັດ / ຜົນງານ..."></textarea><label class="text-[11px] font-bold text-slate-600">ຫຼັກຖານ (ຮູບ / ໄຟລ໌ / ສຽງ — ໃສ່ໄດ້ຫຼາຍ)</label><div class="flex gap-2 my-1"><button onclick="App._evPickFile()" class="px-3 py-1.5 bg-slate-100 rounded-lg text-xs font-bold"><i class="fa-solid fa-image mr-1"></i>ຮູບ/ໄຟລ໌</button><button id="evRecBtn" onclick="App._evToggleRec()" class="px-3 py-1.5 bg-slate-100 rounded-lg text-xs font-bold"><i class="fa-solid fa-microphone mr-1"></i>ອັດສຽງ</button></div><div id="evBox" class="flex flex-wrap mb-2"></div><label class="text-[11px] font-bold text-slate-600 block">ລິ້ງ Google Drive (ໜຶ່ງລິ້ງຕໍ່ແຖວ)</label><textarea id="swLinks" rows="2" placeholder="https://drive.google.com/..." class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs mb-3 mt-1"></textarea><div class="flex justify-end gap-2"><button onclick="UI_close()" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-slate-600 text-sm">ຍົກເລີກ</button><button onclick="App.doSubmitWork(\''+taskId+'\')" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-bold">ສົ່ງໃຫ້ກວດ</button></div></div>'); App._evRefresh(); };
App.doSubmitWork = function(taskId){ var t=Store.getTask(taskId); if(!t) return; var note=U.val('swNote').trim(); if(!note){ U.toast('ກະລຸນາໃສ່ຄຳອະທິບາຍ','error'); return; } var links=U.val('swLinks').split('\n').map(function(l){ var n=U.normalizeLink(l); return n?{type:'link',url:n.url,name:n.name}:null; }).filter(Boolean); var ev=App._ev.concat(links); var apUid=U.val('swApprover'); var apU=apUid?Store.state.users.find(function(u){return u.id===apUid;}):null; Store.updateTask(taskId,{status:'WAITING_APPROVAL',submitNote:note,submitEvidence:ev,submittedAt:new Date().toISOString(),approverUid:apUid||'',approverName:apU?apU.name:''}).then(function(){ if(apUid){ Store.notify(apUid,'📋 ວຽກສົ່ງມາຂໍອະນຸມັດ',t.title+' — '+Store.me.name,taskId,'task'); } else { App.pingHeadOf(t,'ວຽກສົ່ງມາຂໍອະນຸມັດ',t.title+' — '+Store.me.name); } if(t.assignedByUid&&t.assignedByUid!==Store.myUid()&&t.assignedByUid!==apUid) Store.notify(t.assignedByUid,'ວຽກສົ່ງມາຂໍອະນຸມັດ',t.title+' — '+Store.me.name,taskId,'task'); U.closeModal(); App._ev=[]; U.toast('ສົ່ງໃຫ້ກວດແລ້ວ ລໍຖ້າອະນຸມັດ','success'); App.route(); }).catch(function(e){ U.toast('ສົ່ງບໍ່ໄດ້: '+e.message,'error'); }); };

/* ---- ຫົວໜ້າ ກວດ/ອະນຸມັດ ວຽກທີ່ສົ່ງມາ ---- */
App.workReviewHTML = function(){ var list=Store.state.tasks.filter(function(t){ if(t.status!=='WAITING_APPROVAL') return false; if(Store.seesAll()) return true; return t.approverUid===Store.myUid() || (!t.approverUid && Store.isHead() && t.department===Store.me.dept); }).sort(function(a,b){ return (b.submittedAt||'').localeCompare(a.submittedAt||''); });

};
App.approveWork = function(id){ var t=Store.getTask(id); if(!t) return; U.showModal('<div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl p-5"><h3 class="font-bold text-slate-800 mb-1">ອະນຸມັດວຽກ (ໝາຍເປັນສຳເລັດ)</h3><p class="text-[11px] text-slate-500 mb-3">'+U.esc(t.title)+'</p><textarea id="apCmt" rows="2" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm mb-3" placeholder="ຄຳເຫັນ (ຖ້າມີ)..."></textarea><div class="flex justify-end gap-2"><button onclick="UI_close()" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-slate-600 text-sm">ຍົກເລີກ</button><button onclick="App.doApproveWork(\''+id+'\')" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-bold">ອະນຸມັດ</button></div></div>'); };

App.doSendBack = function(id){ var t=Store.getTask(id); if(!t) return; var c=U.val('sbCmt'); Store.updateTask(id,{status:'IN_PROGRESS',headComment:c,failureReason:c}).then(function(){ Store.notify(t.assigneeUid,'ວຽກຖືກສົ່ງກັບໃຫ້ແກ້ໄຂ',t.title+(c?' — '+c:''),id,'task'); U.closeModal(); U.toast('ສົ່ງກັບແລ້ວ','success'); }).catch(function(e){ U.toast('ຜິດພາດ: '+e.message,'error'); }); };

App.newGroupForm = function(){ var users=Store.state.users.filter(function(u){ return u.id!==Store.myUid(); }); var boxes=users.map(function(u){ return '<label class="flex items-center gap-2 p-1.5 rounded hover:bg-slate-50 cursor-pointer"><input type="checkbox" value="'+u.id+'" class="grpMem w-4 h-4">'+U.esc(u.name)+' <span class="text-[10px] text-slate-400">('+U.esc(u.dept)+')</span></label>'; }).join('')||'<p class="text-xs text-slate-400">ຍັງບໍ່ມີຜູ້ໃຊ້ອື່ນ</p>'; U.showModal('<div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl p-5 max-h-[90vh] overflow-y-auto"><div class="flex justify-between items-center mb-2"><h3 class="font-bold text-slate-800"><i class="fa-solid fa-users text-purple-600 mr-1"></i>ສ້າງກຸ່ມແຊັດ</h3><button onclick="UI_close()" class="text-slate-400"><i class="fa-solid fa-xmark"></i></button></div><label class="text-[11px] font-bold text-slate-600">ຊື່ກຸ່ມ *</label><input id="grpName" class="w-full rounded-lg p-2 bg-slate-50 border border-slate-200 mb-2 mt-1" placeholder="ເຊັ່ນ ທີມບັນຊີ"><label class="text-[11px] font-bold text-slate-600">ເລືອກສະມາຊິກ</label><div class="mt-1 border border-slate-200 rounded-lg p-1 max-h-56 overflow-y-auto">'+boxes+'</div><div class="flex justify-end gap-2 mt-3"><button onclick="UI_close()" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-slate-600 text-sm">ຍົກເລີກ</button><button onclick="App.doCreateGroup()" class="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-bold">ສ້າງກຸ່ມ</button></div></div>'); };

App.beep = function(kind){ try{ App.initAudio(); var c=App._audioCtx; if(!c) return; if(c.state==='suspended') c.resume(); var o=c.createOscillator(), g=c.createGain(); o.connect(g); g.connect(c.destination); o.type='sine'; o.frequency.value=kind==='chat'?680:900; g.gain.setValueAtTime(0.001,c.currentTime); g.gain.exponentialRampToValueAtTime(0.25,c.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35); o.start(); o.stop(c.currentTime+0.36); if(kind==='chat'){ var o2=c.createOscillator(),g2=c.createGain(); o2.connect(g2); g2.connect(c.destination); o2.type='sine'; o2.frequency.value=900; g2.gain.setValueAtTime(0.001,c.currentTime+0.18); g2.gain.exponentialRampToValueAtTime(0.2,c.currentTime+0.2); g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5); o2.start(c.currentTime+0.18); o2.stop(c.currentTime+0.52); } }catch(e){} if(navigator.vibrate) try{ navigator.vibrate(kind==='chat'?[40,30,40]:80); }catch(e){} };

App._daysAgo = function(iso){ if(!iso) return 0; return Math.floor((Date.now()-new Date(iso).getTime())/86400000); };

    +'<div><h4 class="text-sm font-bold text-slate-600 mb-2">📥 ຮັບເຂົ້າ ('+incoming.length+')</h4><div class="space-y-2">'+(inRows||'<div class="bg-white rounded-xl p-4 text-center text-slate-400 text-sm border border-slate-100">ບໍ່ມີໃບກິດສຳພັນເຂົ້າ</div>')+'</div></div>'

App.senderAck = function(id){ Store.refUpdate(id,{senderSeen:true}).then(function(){ U.closeModal(); }); };
App.senderResend = function(id){ var r=Store.refGet(id); Store.refUpdate(id,{status:'sent',dueDate:r.receiverDate||r.dueDate,senderSeen:true,receiverComment:'',receiverDate:''},'resent').then(function(){ var rr=Store.refGet(id); Store.notify(rr.toUid,'📨 ໃບກິດສຳພັນ (ສົ່ງຄືນ)',rr.title,id,'referral'); U.closeModal(); U.toast('ສົ່ງຄືນແລ້ວ','success'); }); };
// ---- popup checker (blocking) ----
App.checkPopups = function(){ if(!Store.me) return; var m=document.getElementById('appModal'); if(m && m.style.display==='flex' && m.innerHTML) return; var inc=Store.refIncomingNew(); if(inc.length){ App.openReferral(inc[0].id); return; } var dec=Store.refDeclinedNew(); if(dec.length){ App.openSenderDecline(dec[0].id); return; } };

/* ==================================================================
 *  Cloud (Firebase) — UI ເຊື່ອມຕໍ່
 * ================================================================== */
App.cloudConnectAdmin = function(){ var cfg; try{ cfg=Cloud.parseCfg(U.val('cfgBox')); }catch(e){ U.toast(e.message,'error'); return; } U.toast('ກຳລັງເຊື່ອມ & ອັບຂໍ້ມູນຂຶ້ນ...','info'); Cloud.connect(cfg,{migrate:true}).then(function(){ U.toast('ເຊື່ອມ & ອັບຂໍ້ມູນຂຶ້ນອອນລາຍແລ້ວ ☁️','success'); App.renderTab(); App.rerenderHeaderOnly(); }).catch(function(e){ U.toast('ຜິດພາດ: '+(e.message||e),'error'); }); };
App.cloudCodeForm = function(){ U.showModal('<div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl p-5"><div class="flex justify-between items-center mb-2"><h3 class="font-bold text-slate-800"><i class="fa-solid fa-cloud text-teal-600 mr-1"></i>ເຊື່ອມຖານຂໍ້ມູນອົງກອນ</h3><button onclick="UI_close()" class="text-slate-400"><i class="fa-solid fa-xmark"></i></button></div><p class="text-[11px] text-slate-500 mb-2">ວາງ "ລະຫັດເຊື່ອມຕໍ່" ທີ່ໄດ້ຮັບຈາກແອັດມິນ (ຫຼື config Firebase). ເຮັດຄັ້ງດຽວຕໍ່ເຄື່ອງ.</p><textarea id="ccBox" rows="4" class="code w-full rounded-lg p-2 bg-slate-50 border border-slate-200 text-[11px]" placeholder="ວາງລະຫັດ ຫຼື config ທີ່ນີ້"></textarea><div class="flex justify-end gap-2 mt-3"><button onclick="UI_close()" class="px-4 py-2 hover:bg-slate-100 rounded-lg text-slate-600 text-sm">ຍົກເລີກ</button><button onclick="App.cloudConnectCode()" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-bold">ເຊື່ອມຕໍ່</button></div></div>'); };
App.cloudConnectCode = function(){ var cfg; try{ cfg=Cloud.parseCfg(U.val('ccBox')); }catch(e){ U.toast(e.message,'error'); return; } U.toast('ກຳລັງເຊື່ອມ...','info'); Cloud.connect(cfg,{migrate:false}).then(function(){ U.closeModal(); U.toast('ເຊື່ອມຖານຂໍ້ມູນອົງກອນແລ້ວ ☁️','success'); App.route(); }).catch(function(e){ U.toast('ຜິດພາດ: '+(e.message||e),'error'); }); };
App.cloudCopyCode = function(){ var code=Cloud.code(); try{ navigator.clipboard.writeText(code).then(function(){ U.toast('ກ໊ອບປີ້ລະຫັດເຊື່ອມຕໍ່ແລ້ວ','success'); }); }catch(e){ var t=document.getElementById('ccOut'); if(t){ t.select(); document.execCommand('copy'); U.toast('ກ໊ອບປີ້ແລ້ວ','success'); } } };
App.cloudCopyRules = function(){ try{ navigator.clipboard.writeText(CLOUD_RULES).then(function(){ U.toast('ກ໊ອບປີ້ Rules ແລ້ວ','success'); }); }catch(e){} };
App.cloudDisconnect = function(){ U.confirm('ຕັດການເຊື່ອມຕໍ່ອອນລາຍໃນເຄື່ອງນີ້? (ຂໍ້ມູນອອນລາຍບໍ່ຖືກລຶບ; ເຄື່ອງນີ້ຈະກັບໄປໃຊ້ offline)',function(){ Cloud.disconnect(); }); };
App.cloudShowRules = function(){ U.showModal('<div class="bg-white rounded-2xl w-full max-w-md shadow-2xl p-5"><div class="flex justify-between items-center mb-2"><h3 class="font-bold text-slate-800">Firestore Rules</h3><button onclick="UI_close()" class="text-slate-400"><i class="fa-solid fa-xmark"></i></button></div><p class="text-[11px] text-slate-500 mb-2">ວາງໃນ Firebase Console → Firestore → Rules → Publish</p><textarea readonly rows="7" class="code w-full rounded-lg p-2 bg-slate-900 text-slate-100 text-[11px]">'+U.esc(CLOUD_RULES)+'</textarea><button onclick="App.cloudCopyRules()" class="mt-2 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold w-full">ກ໊ອບປີ້ Rules</button></div>'); };
App.cloudPanel = function(){
  if(Cloud.status()!=='local'){ var code=Cloud.code(); return '<div class="bg-white rounded-2xl border-2 border-teal-200 shadow-sm p-5"><label class="text-[11px] font-bold text-slate-600">ຖານຂໍ້ມູນອອນລາຍ (Firebase)</label><p class="text-sm text-teal-700 font-bold mt-1"><i class="fa-solid fa-cloud mr-1"></i>ເຊື່ອມຕໍ່ອອນລາຍແລ້ວ — ທຸກເຄື່ອງໃຊ້ຂໍ້ມູນດຽວກັນ real-time</p><p class="text-[11px] text-slate-500 mt-2">ໃຫ້ເຄື່ອງອື່ນເຂົ້າຮ່ວມ: ເປີດແອັບ → ໜ້າລ໋ອກອິນ → "ເຊື່ອມຖານຂໍ້ມູນອົງກອນ" → ວາງລະຫັດລຸ່ມນີ້</p><textarea id="ccOut" readonly rows="3" class="code w-full rounded-lg p-2 bg-slate-900 text-teal-100 text-[10px] mt-1">'+U.esc(code)+'</textarea><div class="flex flex-wrap gap-2 mt-2"><button onclick="App.cloudCopyCode()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold"><i class="fa-solid fa-copy mr-1"></i>ກ໊ອບປີ້ລະຫັດເຊື່ອມຕໍ່</button><button onclick="App.cloudDisconnect()" class="px-3 py-2 bg-rose-50 text-rose-600 rounded-lg text-xs font-bold">ຕັດການເຊື່ອມຕໍ່ (ເຄື່ອງນີ້)</button></div></div>'; }
  return '<div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5"><label class="text-[11px] font-bold text-slate-600">ຖານຂໍ້ມູນອອນລາຍ (Firebase) — ໃສ່ໂດຍແອັດມິນ</label><p class="text-xs text-slate-500 mt-1">ຕອນນີ້ໃຊ້ offline (ເກັບໃນເຄື່ອງ). ເຊື່ອມ Firebase ເພື່ອໃຫ້ <b>ທຸກຄົນ ທຸກເຄື່ອງ ໃຊ້ຂໍ້ມູນດຽວກັນ real-time</b> — ອັບ/ແຈ້ງການ/ລິ້ງ ຈະເປັນຕົວໃໝ່ຫຼ້າສຸດທຸກເຄື່ອງ.</p><div class="text-[11px] text-slate-600 bg-slate-50 rounded-lg p-2 mt-2 leading-relaxed">1. console.firebase.google.com → ສ້າງໂປຣເຈັກ (ຟຣີ)<br>2. Firestore Database → Create database (Production)<br>3. ⚙️ Project settings → Your apps → Web (&lt;/&gt;) → ກ໊ອບ block firebaseConfig<br>4. Firestore → Rules → ວາງ Rules (ປຸ່ມລຸ່ມ) → Publish</div><textarea id="cfgBox" rows="7" class="code w-full rounded-lg p-2 bg-slate-50 border border-slate-200 mt-2 text-[11px]" placeholder="const firebaseConfig = { apiKey: ..., projectId: ..., ... }"></textarea><div class="flex flex-wrap gap-2 mt-2"><button onclick="App.cloudConnectAdmin()" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-bold"><i class="fa-solid fa-cloud-arrow-up mr-1"></i>ເຊື່ອມ & ອັບຂໍ້ມູນຂຶ້ນ</button><button onclick="App.cloudShowRules()" class="px-3 py-2 bg-slate-100 rounded-lg text-xs font-bold">ເບິ່ງ/ກ໊ອບ Rules</button></div><div class="text-[10px] text-amber-700 bg-amber-50 rounded-lg p-2 mt-2"><i class="fa-solid fa-shield-halved mr-1"></i>ຮຸ່ນນີ້ໃຊ້ Rules ແບບເປີດ (ໃຜມີ config ກໍເຂົ້າໄດ້) ເໝາະໃຊ້ພາຍໃນອົງກອນ.</div></div>';
};

/* ==================================================================
 *  BOOT — ເປີດໄຟລ໌ແລ້ວໃຊ້ໄດ້ທັນທີ (ບໍ່ຕ້ອງຕັ້ງຄ່າ)
 * ================================================================== */
document.addEventListener('DOMContentLoaded', function(){
  // ເປີດໃຊ້ສຽງເມື່ອຜູ້ໃຊ້ແຕະຈໍຄັ້ງທຳອິດ (ຂໍ້ກຳນົດ browser)
  var unlock=function(){ App.initAudio(); if(App._audioCtx&&App._audioCtx.state==='suspended') App._audioCtx.resume(); window.removeEventListener('click',unlock); window.removeEventListener('touchstart',unlock); };
  window.addEventListener('click',unlock); window.addEventListener('touchstart',unlock);
  Store.init();
  App.boot();
  // ຖ້າແອັດມິນເຄີຍເຊື່ອມ Firebase ໄວ້ (ຫຼື ເຄື່ອງນີ້ໄດ້ວາງລະຫັດແລ້ວ) → ເຊື່ອມອັດຕະໂນມັດ
  var fb=Cloud.saved();
  if(fb){ U.toast('ກຳລັງເຊື່ອມຖານຂໍ້ມູນອອນລາຍ...','info'); Cloud.connect(fb,{migrate:false}).then(function(){ U.toast('ເຊື່ອມຖານຂໍ້ມູນອອນລາຍແລ້ວ ☁️','success'); }).catch(function(e){ U.toast('ເຊື່ອມອອນລາຍບໍ່ໄດ້: '+(e.message||e),'error'); }); }
});
</script>
